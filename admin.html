<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>انجاز - لوحة التحكم</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

<div class="login-page" id="loginPage">
  <div class="login-box">
    <div class="login-logo">إ</div>
    <h1>لوحة التحكم</h1>
    <p>انجاز للتوصيل</p>
    <div class="login-error" id="loginError">البريد الإلكتروني أو كلمة المرور غير صحيحة</div>
    <input type="email" id="loginEmail" placeholder="البريد الإلكتروني" value="admin@ingaz.com">
    <input type="password" id="loginPassword" placeholder="كلمة المرور" value="123456">
    <button onclick="handleLogin()"><i class="fas fa-lock"></i> تسجيل الدخول</button>
  </div>
</div>

<div id="dashboard" class="hidden">
  <div class="admin-header">
    <div class="container">
      <h2><i class="fas fa-store"></i> <span>إ</span>نجاز <small style="font-weight:400;font-size:14px;opacity:0.7;">لوحة التحكم</small></h2>
      <button class="logout-btn" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> تسجيل خروج</button>
    </div>
  </div>

  <div class="container">
    <div class="stats-row">
      <div class="stat-card"><div class="num" id="statTotal">0</div><div class="label">إجمالي الطلبات</div></div>
      <div class="stat-card"><div class="num" id="statPending" style="color:#856404;">0</div><div class="label">قيد الانتظار</div></div>
      <div class="stat-card"><div class="num" id="statActive" style="color:#155724;">0</div><div class="label">قيد التنفيذ</div></div>
      <div class="stat-card"><div class="num" id="statDelivered" style="color:#0c5460;">0</div><div class="label">تم التوصيل</div></div>
    </div>

    <div class="orders-card">
      <div class="card-header">
        <h3><i class="fas fa-clipboard-list"></i> الطلبات</h3>
        <button class="refresh-btn" onclick="loadOrders()"><i class="fas fa-sync-alt"></i> تحديث</button>
      </div>
      <div id="ordersContent">
        <div class="empty-orders">
          <i class="fas fa-inbox"></i>
          <p>لا توجد طلبات حتى الآن</p>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="js/admin.js"></script>
</body>
</html>
